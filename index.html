<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="base-path" content=".">
<title>99Test — Test del Día</title>
<link rel="stylesheet" href="compartido/estilos.css">
<style>
  .hub-bg {
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(184,148,62,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(184,148,62,0.03) 0%, transparent 60%);
  }
  body.dark .hub-bg {
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(201,169,110,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(201,169,110,0.04) 0%, transparent 60%);
  }
</style>
</head>
<body class="hub-bg">
<div id="headerPlaceholder"></div>

<div class="main-wrap">
  <div class="screen active" style="width:100%">
    <div class="card">
      <div class="home-hero">
        <div class="home-title">Test del Día</div>
        <div class="home-subtitle" id="todayDate">—</div>
      </div>

      <div id="doneBanner" style="display:none"></div>

      <div class="test-card" id="todayCard">
        <div class="test-title" id="todayTitle">—</div>
        <div class="test-meta" id="todayMeta">10 preguntas</div>
        <div class="test-badges">
          <span class="badge" id="todayBadge">Test #1</span>
          <span class="badge" id="todayEmojis">🌍</span>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="startBtn">▶ Comenzar test</button>
        <button class="btn btn-secondary" onclick="goToPage('archivo.html')">📚 Tests</button>
      </div>
    </div>
  </div>
</div>

<div id="footerPlaceholder"></div>
<script src="compartido/motor.js"></script>
<script>
/* ─── HUB ── */
document.addEventListener('DOMContentLoaded', () => {
  const todayId = getTodaysTestId();
  const test = TEST_MANIFEST[todayId];
  if (!test) return;

  document.getElementById('todayDate').textContent = '📅 ' + formatDateEs(new Date());
  document.getElementById('todayTitle').textContent = test.title;
  document.getElementById('todayMeta').textContent = '10 preguntas · ' + test.emojis;
  document.getElementById('todayBadge').textContent = 'Test #' + (todayId + 1);
  document.getElementById('todayEmojis').textContent = test.emojis;

  // Today's results
  const results = getResults();
  const todayKey = dateStr(new Date());
  const done = results[todayKey];
  const banner = document.getElementById('doneBanner');
  if (done) {
    banner.style.display = 'block';
    banner.innerHTML = '<div class="done-badge">✅ Completado · ' + done.correct + '/10 (' + done.pct + '%)</div>';
  }

  // Start button
  document.getElementById('startBtn').onclick = () => {
    goToPage('tests/' + test.folder + '/');
  };
  document.getElementById('todayCard').onclick = () => {
    goToPage('tests/' + test.folder + '/');
  };
});
</script>
</body>
</html>
