<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="base-path" content=".">
<title>Tests anteriores — 99Test</title>
<link rel="stylesheet" href="compartido/estilos.css">
<style>
  .cal-month { margin-bottom: 22px; }
  .cal-nav { display:flex;align-items:center;justify-content:space-between;margin-bottom:14px; }
  .cal-nav h3 { font-family:'Playfair Display',Georgia,serif;font-size:1.1rem; }
  .cal-weekdays {
    display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;
    text-align:center;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;
    color:var(--text-secondary);font-weight:600;
  }
  .cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:3px; }
  .cal-cell {
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    border-radius:50%;font-size:0.82rem;font-weight:500;
    border:1px solid transparent;position:relative;
    min-height:36px;transition:all var(--transition);
  }
  .cal-cell.empty { border:none; }
  .cal-cell.past { color:var(--text-secondary); }
  .cal-cell.available {
    color:var(--text);cursor:pointer;border-color:var(--accent-border);
    background:var(--accent-bg);font-weight:600;
  }
  .cal-cell.available:hover { transform:scale(1.12);box-shadow:0 0 0 3px var(--accent-glow); }
  .cal-cell.today { border-color:var(--accent);border-width:2px;font-weight:700; }
  .cal-cell.completed { background:var(--green-bg);border-color:var(--green-border);color:var(--green) !important; }
  .cal-cell.future { color:#b0b0b0; }
  body.dark .cal-cell.future { color:#3a3a45; }
  .cal-cell .check-mark {
    position:absolute;top:-2px;right:-2px;font-size:0.55rem;
  }
  .cal-legend {
    display:flex;gap:14px;justify-content:center;margin-top:14px;
    font-size:0.75rem;flex-wrap:wrap;
  }
  .cal-legend div { display:flex;align-items:center;gap:4px; }
  .cal-legend .dot { width:10px;height:10px;border-radius:50%;display:inline-block; }
  .dot.green { background:var(--green); }
  .dot.gold { background:var(--accent); }
  .dot.gray { background:var(--border); }

  .test-list { display:flex;flex-direction:column;gap:8px; }
  .tl-item {
    display:flex;align-items:center;gap:12px;
    padding:12px 16px;background:var(--surface-raised);
    border:1px solid var(--border);border-radius:var(--radius);
    cursor:pointer;transition:all var(--transition);
  }
  .tl-item:hover:not(.locked) { border-color:#ccc;transform:translateY(-1px); }
  body.dark .tl-item:hover:not(.locked) { border-color:#555; }
  .tl-item.locked { opacity:0.5;cursor:default; }
  .tl-item .tl-date { font-size:0.7rem;color:var(--text-secondary);width:60px;flex-shrink:0;font-weight:600; }
  .tl-item .tl-title { flex:1;font-weight:600;font-size:0.9rem; }
  .tl-item .tl-emojis { font-size:0.85rem;color:var(--text-secondary);margin-right:6px; }
  .tl-item .tl-status { font-size:0.78rem;flex-shrink:0; }
  .tl-item .tl-num { font-size:0.7rem;color:var(--text-secondary);width:28px;flex-shrink:0;font-weight:700; }
</style>
</head>
<body>
<div id="headerPlaceholder"></div>

<div class="main-wrap">
  <div class="screen active" style="width:100%">
    <div class="card">
      <h2 style="font-family:'Playfair Display';font-size:1.4rem;margin-bottom:3px">📚 Tests anteriores</h2>
      <p style="color:var(--text-secondary);font-size:0.88rem;margin-bottom:6px">
        Cada día se publica un test nuevo. Los tests pasados siguen disponibles.
      </p>

      <!-- CALENDAR -->
      <div class="cal-month">
        <div class="cal-nav">
          <span></span>
          <h3 id="calTitle">junio 2026</h3>
          <span></span>
        </div>
        <div class="cal-weekdays">
          <span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend">
          <div><span class="dot green"></span> Completado</div>
          <div><span class="dot gold"></span> Hoy</div>
          <div><span class="dot gray"></span> Próximamente</div>
        </div>
      </div>

      <!-- TEST LIST -->
      <h3 style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-secondary);margin-bottom:10px;font-weight:600;">Tests disponibles</h3>
      <div class="test-list" id="testList"></div>

      <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);text-align:center">
        <button class="btn btn-secondary btn-sm" onclick="goToPage('tests/especiales/')">⭐ Ver tests especiales</button>
      </div>
    </div>
  </div>
</div>

<div id="footerPlaceholder"></div>
<script src="compartido/motor.js"></script>
<script>
/* ─── CALENDAR ── */
document.addEventListener('DOMContentLoaded', () => {
  renderCalendar();
  renderTestList();
});

function renderCalendar() {
  const year = 2026, month = 5; // junio
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0

  const today = new Date(); today.setHours(0,0,0,0);
  const results = getResults();

  let html = '';
  for (let i = 0; i < startDow; i++) html += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(year, month, d);
    const isToday = date.getTime() === today.getTime();
    const isFuture = date > today;

    // Is this day in the available test range?
    const epoch = new Date(EPOCH);
    epoch.setHours(0,0,0,0);
    const diff = Math.round((date - epoch) / (1000*60*60*24));
    const isAvailable = diff >= 0 && diff < TEST_MANIFEST.length && !isFuture;

    const key = dateStr(date);
    const done = results[key];
    const isCompleted = done !== undefined;

    let cls = 'cal-cell';
    if (isAvailable) cls += ' available';
    if (isCompleted) cls += ' completed';
    if (isToday) cls += ' today';
    else if (isFuture && !isAvailable) cls += ' future';
    else if (!isAvailable) cls += ' past';

    const mark = isCompleted ? '<span class="check-mark">✓</span>' : '';

    if (isAvailable) {
      html += `<div class="${cls}" onclick="goToPage('tests/${TEST_MANIFEST[diff].folder}/${TEST_MANIFEST[diff].test}/')" title="${TEST_MANIFEST[diff].title}">${d}${mark}</div>`;
    } else {
      html += `<div class="${cls}">${d}</div>`;
    }
  }
  document.getElementById('calGrid').innerHTML = html;
}

function renderTestList() {
  const today = new Date(); today.setHours(0,0,0,0);
  const epoch = new Date(EPOCH);
  epoch.setHours(0,0,0,0);
  const todayDiff = Math.round((today - epoch) / (1000*60*60*24));
  const results = getResults();

  const list = document.getElementById('testList');

  // Show tests from the start up to today
  const maxShow = Math.min(todayDiff + 1, TEST_MANIFEST.length);
  const items = [];

  for (let i = 0; i < maxShow; i++) {
    const test = TEST_MANIFEST[i];
    if (!test) continue;

    const testDate = new Date(epoch);
    testDate.setDate(testDate.getDate() + i);
    const key = dateStr(testDate);
    const done = results[key];
    const isToday = i === todayDiff;

    let statusText, statusClass;
    if (done) { statusText = '✅'; statusClass = ''; }
    else if (isToday) { statusText = '🔥 Hoy'; statusClass = ''; }
    else { statusText = '⏳'; statusClass = ''; }

    const dateLabel = `${String(testDate.getDate()).padStart(2,'0')} jun`;

    items.push(`
      <div class="tl-item" onclick="goToPage('tests/${test.folder}/${test.test}/')">
        <div class="tl-num">#${i+1}</div>
        <div class="tl-date">${dateLabel}</div>
        <div class="tl-title">${test.title}</div>
        <span class="tl-emojis">${test.emojis}</span>
        <div class="tl-status">${statusText}</div>
      </div>
    `);
  }

  list.innerHTML = items.reverse().join('');
}
</script>
</body>
</html>
